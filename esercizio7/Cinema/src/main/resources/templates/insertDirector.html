<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <title>New Director</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    /* Background */
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Container unico (titolo + form) */
    .container {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      width: 460px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
    }

    /* Titolo */
    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    /* Form layout */
    form {
      display: flex;
      flex-direction: column;
    }

    /* Riga input */
    form div {
      margin-bottom: 15px;
    }

    /* Label sopra input */
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      color: #666;
    }

    /* Input full width */
    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      transition: 0.3s;
    }

    /* Focus */
    input:focus {
      border-color: #667eea;
      box-shadow: 0 0 6px rgba(102, 126, 234, 0.5);
      outline: none;
    }

    /* Bottone */
    button {
      margin-top: 10px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    /* Hover */
    button:hover {
      background: #5a67d8;
      transform: translateY(-2px);
    }

    /* Errori */
    .validationError {
      font-size: 12px;
      color: #e53e3e;
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Insert a new Director</h1>

  <form method="POST" th:object="${director}">
    <div>
      <label for="name">Name:</label>
      <input type="text" id="name" th:field="${director.name}"/>
      <span class="validationError" th:if="${#fields.hasErrors('name')}"
            th:errors="${director.name}">Name Error</span>

    </div>
    <div>
      <label for="surname">Surname:</label>
      <input type="text" id="surname" th:field="${director.surname}"/>
      <span class="validationError" th:if="${#fields.hasErrors('surname')}"
            th:errors="${director.surname}">Surname Error</span>
    </div>

    <div>
      <button type="submit">Save</button>
    </div>
  </form>
</div>

</body>
</html>
