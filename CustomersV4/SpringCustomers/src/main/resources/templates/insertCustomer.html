<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New customer</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Background */
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container unico (titolo + form) */
        .container {
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            width: 460px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
        }

        /* Titolo */
        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        /* Form layout */
        form {
            display: flex;
            flex-direction: column;
        }

        /* Riga input */
        form div {
            margin-bottom: 15px;
        }

        /* Label sopra input */
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #666;
        }

        /* Input full width */
        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        /* Focus */
        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 6px rgba(102, 126, 234, 0.5);
            outline: none;
        }

        /* Bottone */
        button {
            margin-top: 10px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Hover */
        button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        /* Errori */
        .validationError {
            font-size: 12px;
            color: #e53e3e;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Insert new customer</h1>

    <form method="POST" th:object="${customer}">
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" th:field="${customer.name}"/>
            <span class="validationError" th:if="${#fields.hasErrors('name')}"
                  th:errors="${customer.name}">Name Error</span>

        </div>
        <div>
            <label for="surname">Surname:</label>
            <input type="text" id="surname" th:field="${customer.surname}"/>
            <span class="validationError" th:if="${#fields.hasErrors('surname')}"
                  th:errors="${customer.surname}">Name Error</span>
        </div>
        <div>
            <label for="age">Age:</label>
            <input type="number" id="age" th:field="${customer.age}"/>
            <span class="validationError" th:if="${#fields.hasErrors('age')}"
                  th:errors="${customer.age}">Name Error</span>
        </div>
        <div>
            <label for="street">Street:</label>
            <input type="text" id="street" th:field="${customer.address.street}"/>
            <span class="validationError" th:if="${#fields.hasErrors('address.street')}"
                  th:errors="${customer.address.street}">Street Error</span>
        </div>
        <div>
            <label for="num">Number:</label>
            <input type="text" id="num" th:field="${customer.address.num}"/>
            <span class="validationError" th:if="${#fields.hasErrors('address.num')}"
                  th:errors="${customer.address.num}">Number Error</span>
        </div>
        <div>
            <label for="zip">ZIP:</label>
            <input type="text" id="zip" th:field="${customer.address.zip}"/>
            <span class="validationError" th:if="${#fields.hasErrors('address.zip')}"
                  th:errors="${customer.address.zip}">ZIP Error</span>
        </div>
        <div>
            <label for="city">City:</label>
            <input type="text" id="city" th:field="${customer.address.city}"/>
            <span class="validationError" th:if="${#fields.hasErrors('address.city')}"
                  th:errors="${customer.address.city}">City Error</span>
        </div>
        <div>
            <label for="nation">Nation:</label>
            <input type="text" id="nation" th:field="${customer.address.nation}"/>
            <span class="validationError" th:if="${#fields.hasErrors('address.nation')}"
                  th:errors="${customer.address.nation}">Nation Error</span>
        </div>


        <div>
            <button type="submit">Save</button>
        </div>
    </form>
</div>

</body>
</html>
