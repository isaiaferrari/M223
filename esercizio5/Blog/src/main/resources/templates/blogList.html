<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Blog List</title>
</head>
<body>

<h1>Blog</h1>
<hr>

<article th:each="blog : ${blogs}">
  <h2 th:text="${blog.title}"></h2>
  <p>
    <strong>Data:</strong> <span th:text="${blog.date}"></span> |
    <strong>Categoria:</strong> <span th:text="${blog.category}"></span> |
    <strong>Autore:</strong> <span th:text="${blog.author}"></span> |
    <strong>Like:</strong> <span th:text="${blog.likes}"></span>
  </p>
  <p th:text="${blog.content}"></p>
  <hr>
</article>
</body>
</html>
