<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insert Item</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Geist:wght@300;400;500&display=swap');

        :root {
            --bg:        #0d0d0f;
            --surface:   #131317;
            --surface2:  #1a1a20;
            --border:    #2a2a35;
            --border-focus: #7c6dfa;
            --accent:    #7c6dfa;
            --accent2:   #a78bfa;
            --text:      #e8e8f0;
            --muted:     #6b6b80;
            --error:     #f87171;
            --radius:    10px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Geist', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        /* glow blob in background */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(124,109,250,0.10) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2.5rem 2.8rem;
            box-shadow: 0 0 0 1px rgba(124,109,250,0.06), 0 24px 80px rgba(0,0,0,0.7);
            position: relative;
            z-index: 1;
            animation: slideUp 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        /* top accent line */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 1px;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.8px;
            color: var(--text);
            margin-bottom: 2rem;
        }

        h1::after {
            content: '';
            display: block;
            width: 32px;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
            margin-top: 10px;
        }

        form > div {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 1.1rem;
        }

        form > div:last-child {
            margin-top: 1.8rem;
            margin-bottom: 0;
        }

        label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: var(--muted);
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 10px 14px;
            font-family: 'Geist', sans-serif;
            font-size: 0.92rem;
            font-weight: 400;
            color: var(--text);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -moz-appearance: textfield;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

        input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(124,109,250,0.15);
        }

        input::placeholder { color: var(--muted); opacity: 0.5; }

        .validationError {
            font-size: 0.76rem;
            color: var(--error);
            font-style: italic;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            font-family: 'Syne', sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
            box-shadow: 0 4px 20px rgba(124,109,250,0.35);
        }

        button[type="submit"]:hover {
            background: #6a5be0;
            box-shadow: 0 6px 28px rgba(124,109,250,0.50);
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 520px) {
            .container { padding: 1.8rem 1.4rem 2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Insert new Item</h1>

    <form method="POST" th:object="${item}">
        <div>
            <label for="code">Code:</label>
            <input type="text" id="code" th:field="${item.code}"/>
            <span class="validationError" th:if="${#fields.hasErrors('code')}"
                  th:errors="${item.code}">Code Error</span>

        </div>
        <div>
            <label for="type">Type:</label>
            <input type="text" id="type" th:field="${item.type}"/>
            <span class="validationError" th:if="${#fields.hasErrors('type')}"
                  th:errors="${item.type}">Type Error</span>
        </div>
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" th:field="${item.name}"/>
            <span class="validationError" th:if="${#fields.hasErrors('name')}"
                  th:errors="${item.name}">Name Error</span>
        </div>
        <div>
            <label for="price">Price:</label>
            <input type="number" step=0.01 id="price" th:field="${item.price}"/>
            <span class="validationError" th:if="${#fields.hasErrors('price')}"
                  th:errors="${item.price}">Price Error</span>
        </div>
        <div>
            <label for="itemCount">Item Count:</label>
            <input type="number" id="itemCount" th:field="${item.itemCount}"/>
            <span class="validationError" th:if="${#fields.hasErrors('itemCount')}"
                  th:errors="${item.itemCount}">Item Count Error</span>
        </div>

        <div>
            <button type="submit">Save</button>
        </div>
    </form>
</div>

</body>
</html>
