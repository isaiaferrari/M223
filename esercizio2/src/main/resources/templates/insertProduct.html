<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Insert Product</title>
</head>
<body>
<h1>Insert a new product</h1>
<form method="POST"
      th:action="@{/newproduct}"
      th:object="${product}">
  <div>
    <label for="id">ID:</label>
    <input type="number" id="id" th:field="*{id}" placeholder="Inserisci ID" required />
    <span class="validationError"
          th:if="${#fields.hasErrors('id')}"
          th:errors="${product.id}">Id Error
        </span>
  </div>

  <div>
    <label for="name">Nome:</label>
    <input type="text" id="name" th:field="*{name}" placeholder="Inserisci il nome" required />
    <span class="validationError"
          th:if="${#fields.hasErrors('name')}"
          th:errors="${product.name}">Name Error
        </span>
  </div>

  <div>
    <label for="price">Price:</label>
    <input type="number" id="price" th:field="*{price}" placeholder="Inserisci il Prezzo" required />
    <span class="validationError"
          th:if="${#fields.hasErrors('price')}"
          th:errors="${product.price}">Price Error
        </span>
  </div>

  <div>
    <label for="expirationDate">Date:</label>
    <input type="date" id="expirationDate" th:field="*{expirationDate}" placeholder="Inserisci la data di scadenza" required />
    <span class="validationError"
          th:if="${#fields.hasErrors('expirationDate')}"
          th:errors="${product.expirationDate}">Expiration Date Error
        </span>
  </div>

  <div>
    <label for="description">Date:</label>
    <input type="text" id="description" th:field="*{description}" placeholder="Inserisci la descrizione" required />
  </div>

  <div>
    <button type="submit">Save product</button>
  </div>
</form>
</body>
</html>
